name: CI

on:
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: worker

      - name: Run tests
        run: npm test
        working-directory: worker

  lint-scripts:
    name: Bash syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check setup.sh
        run: bash -n scripts/setup.sh

      - name: Check build-and-deploy.sh
        run: bash -n scripts/build-and-deploy.sh
